on:
  release:
    types: [created]

permissions:
    contents: write
    packages: write

jobs:
  release:
    name: Release with GoReleaser
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.26"
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.HOMEBREW_SCOOP_TOKEN }}
